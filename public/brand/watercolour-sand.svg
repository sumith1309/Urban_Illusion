<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="presentation">
  <defs>
    <filter id="bleedS" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="3" seed="13"/>
      <feDisplacementMap in="SourceGraphic" scale="70"/>
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <radialGradient id="sandWash" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#D9C49A" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#EFE6D4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EFE6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#bleedS)">
    <ellipse cx="380" cy="380" rx="320" ry="240" fill="url(#sandWash)"/>
    <ellipse cx="180" cy="220" rx="120" ry="90"  fill="#D9C49A" opacity="0.55"/>
    <ellipse cx="640" cy="540" rx="160" ry="100" fill="#D9C49A" opacity="0.4"/>
  </g>
  <g fill="#B8965A" opacity="0.6">
    <circle cx="100" cy="280" r="2"/>
    <circle cx="700" cy="160" r="1.6"/>
    <circle cx="640" cy="700" r="2.2"/>
    <circle cx="240" cy="640" r="1.8"/>
    <circle cx="540" cy="60"  r="1.4"/>
  </g>
</svg>
