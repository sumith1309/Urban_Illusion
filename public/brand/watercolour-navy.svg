<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="presentation">
  <defs>
    <filter id="bleed" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="80"/>
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <radialGradient id="navyWash" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#1E3A8A" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#0B1B3F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0B1B3F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="navyDrip" cx="50%" cy="80%" r="40%">
      <stop offset="0%"  stop-color="#14213D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#14213D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#bleed)">
    <ellipse cx="400" cy="320" rx="260" ry="190" fill="url(#navyWash)"/>
    <ellipse cx="420" cy="560" rx="80"  ry="180" fill="url(#navyDrip)"/>
    <circle  cx="560" cy="280" r="40"  fill="#0B1B3F" opacity="0.35"/>
    <circle  cx="240" cy="380" r="22"  fill="#0B1B3F" opacity="0.30"/>
    <circle  cx="510" cy="640" r="14"  fill="#0B1B3F" opacity="0.45"/>
    <circle  cx="350" cy="680" r="9"   fill="#0B1B3F" opacity="0.40"/>
  </g>
  <!-- Speckled spatter on top — outside the bleed filter so dots stay crisp -->
  <g fill="#0B1B3F" opacity="0.55">
    <circle cx="120" cy="200" r="2"/>
    <circle cx="680" cy="180" r="1.6"/>
    <circle cx="700" cy="430" r="2.4"/>
    <circle cx="140" cy="600" r="1.8"/>
    <circle cx="600" cy="700" r="2"/>
    <circle cx="320" cy="120" r="1.4"/>
    <circle cx="80"  cy="380" r="2.2"/>
  </g>
</svg>
